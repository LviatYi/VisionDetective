[cards.runtime_specialized_param]
type = "interactive"

[cards.runtime_specialized_param.params]
type = "dialogue"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 1
source = 1
text = "我已经完全找到了真相！"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 2
source = 2
text = "啊！呃..."

[[cards.runtime_specialized_param.params.params.nodes]]
id = 3
source = 2
text = "真相是什么呢，先生？"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 4
source = 1
text = "门锁完好无损，想必是熟人作案。也许就是邻居！"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 5
source = 2
text = "啊！你怎么...不，不，我的先生啊！你不能怀疑我，你看，我都没有逃跑！"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 6
source = 2
text = "对，对...你的证据呢？！"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 7
source = 1
text = "想必你不知道的是，受害者强撑着一口气，从卧室爬到了客厅。"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 8
source = 2
text = "客厅...客厅？！"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 9
source = 1
text = "而你却说，「卧室里死了个人」！"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 9
source = 1
text = "人无法知晓视限之外的事，而你怎么知道受害者是在卧室中死去的呢？"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 10
source = 2
text = "好吧，好吧...我坦白，是他先炫耀他的宝贝钻石...我是一时昏头了。"

[[cards.runtime_specialized_param.params.params.nodes]]
id = 11
